<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>chaff</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login" class="login hidden">
  <form id="login-form" class="login-box">
    <h1>
      <svg class="logo" width="22" height="22" viewBox="0 0 18 18" aria-hidden="true"><g fill="currentColor"><rect x="1" y="2" width="5" height="3"/><rect x="7" y="2" width="5" height="3"/><rect x="13" y="2" width="4" height="3"/><rect x="1" y="7" width="3" height="3"/><rect x="5" y="7" width="5" height="3"/><rect x="11" y="7" width="6" height="3"/><rect x="1" y="12" width="5" height="3"/><rect x="7" y="12" width="5" height="3"/><rect x="13" y="12" width="4" height="3"/></g></svg>
      <span>chaff</span>
    </h1>
    <p class="dim">Вход по токену. Токен выпускается из CLI:<br><code>chaff web token create</code></p>
    <input id="token" type="password" autocomplete="off" spellcheck="false" placeholder="chaff_…">
    <button type="submit">Войти</button>
    <div id="login-err" class="err"></div>
    <div id="update" class="update hidden"></div>
    <div class="foot">
      <span id="ver" class="dim"></span>
      <span class="dim">© coffeinium</span>
    </div>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <span class="brand">
      <svg class="logo" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><g fill="currentColor"><rect x="1" y="2" width="5" height="3"/><rect x="7" y="2" width="5" height="3"/><rect x="13" y="2" width="4" height="3"/><rect x="1" y="7" width="3" height="3"/><rect x="5" y="7" width="5" height="3"/><rect x="11" y="7" width="6" height="3"/><rect x="1" y="12" width="5" height="3"/><rect x="7" y="12" width="5" height="3"/><rect x="13" y="12" width="4" height="3"/></g></svg>
      <span class="name">chaff</span>
    </span>
    <nav id="tabs"></nav>
    <span class="spacer"></span>
    <label class="auto"><input type="checkbox" id="auto" checked> авто</label>
    <button id="refresh" class="ghost">↻</button>
    <button id="logout" class="ghost">выход</button>
  </header>
  <div id="msg" class="msg hidden"></div>
  <main id="view"></main>
</div>

<script src="app.js" defer></script>
</body>
</html>
